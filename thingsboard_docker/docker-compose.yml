services:
  postgres:
    image: postgres:15-alpine
    container_name: thingsboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - thingsboard-network

  thingsboard:
    image: thingsboard/tb-postgres:4.2.1
    container_name: thingsboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      TB_QUEUE_TYPE: in-memory
      HTTP_BIND_ADDRESS: 0.0.0.0
      HTTP_BIND_PORT: 9090
      MQTT_BIND_ADDRESS: 0.0.0.0
      MQTT_BIND_PORT: 1883
      COAP_BIND_ADDRESS: 0.0.0.0
      COAP_BIND_PORT: 5683
      JAVA_OPTS: >-
        -Xms1024M
        -Xmx2048M
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -Dplatform=docker
        -Dinstall.data_dir=/data
      TB_SERVICE_ID: tb-core-0
    ports:
      - "9090:9090"
      - "1883:1883"
      - "7070:7070"
      - "5683:5683/udp"
    volumes:
      - tb_data:/data
      - tb_logs:/var/log/thingsboard
    networks:
      - thingsboard-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/login || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 300s

networks:
  thingsboard-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  tb_data:
    driver: local
  tb_logs:
    driver: local