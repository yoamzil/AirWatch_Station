services:
  postgres:
    image: postgres:15-alpine
    container_name: thingsboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: thingsboard
      POSTGRES_USER: thingsboard
      POSTGRES_PASSWORD: thingsboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thingsboard -d thingsboard"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - thingsboard-network

  thingsboard:
    image: thingsboard/tb-postgres:4.2.1
    container_name: thingsboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/thingsboard
      SPRING_DATASOURCE_USERNAME: thingsboard
      SPRING_DATASOURCE_PASSWORD: thingsboard
      
      # Queue Configuration
      TB_QUEUE_TYPE: in-memory
      
      # HTTP Configuration
      HTTP_BIND_ADDRESS: 0.0.0.0
      HTTP_BIND_PORT: 9090
      
      # MQTT Configuration
      MQTT_BIND_ADDRESS: 0.0.0.0
      MQTT_BIND_PORT: 1883
      
      # CoAP Configuration
      COAP_BIND_ADDRESS: 0.0.0.0
      COAP_BIND_PORT: 5683
      
      # Memory Configuration
      JAVA_OPTS: >-
        -Xms1024M
        -Xmx2048M
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -Dplatform=docker
        -Dinstall.data_dir=/data
      
      # Service ID
      TB_SERVICE_ID: tb-core-0
      
    ports:
      - "9090:9090"   # HTTP UI/REST API
      - "1883:1883"   # MQTT
      - "7070:7070"   # Edge RPC
      - "5683:5683/udp"   # CoAP
    volumes:
      - tb_data:/data
      - tb_logs:/var/log/thingsboard
    networks:
      - thingsboard-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/login || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 300s

networks:
  thingsboard-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  tb_data:
    driver: local
  tb_logs:
    driver: local